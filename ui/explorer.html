<!DOCTYPE html>

    <style>
        /* Ensure basic layout if CSS fails to load or for structure */
        body, html {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #1e1e1e; /* Fallback bg */
        }
        #graph-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 0;
        }
        #status-bar-container {
            position: absolute;
            top: 0;
            width: 100%;
            z-index: 100;
        }
    </style>

<body>
    <!-- Graph fills center 3/4 -->
